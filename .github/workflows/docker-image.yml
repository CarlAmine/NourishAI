name: Run NourishAI Docker image

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  run-my-container:
    runs-on: ubuntu-latest
    steps:
      - name: Pull image
        run: docker pull carlamine/nourishai-app:latest

      - name: Run container (smoke test)
        run: |
          docker run -d --rm --name nourishai -p 8000:8000 -p 8501:8501 carlamine/nourishai-app:latest
          docker ps
          docker logs --tail 200 nourishai
